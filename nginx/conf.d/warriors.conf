# ── PUBLIC SITE: southwagga.com.au ──────────────────────────
server {
  listen 80;
  server_name southwagga.com.au www.southwagga.com.au;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name southwagga.com.au www.southwagga.com.au;

  ssl_certificate     /etc/nginx/certs/southwagga.com.au.crt;
  ssl_certificate_key /etc/nginx/certs/southwagga.com.au.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  root  /var/www/html;
  index index.html;

  limit_req zone=general burst=40 nodelay;

  # Static assets — long cache
  location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA-style routing for Astro
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Security headers
  add_header X-Frame-Options        "SAMEORIGIN"   always;
  add_header X-Content-Type-Options "nosniff"      always;
  add_header Referrer-Policy        "strict-origin" always;
}

# ── DIRECTUS ADMIN: admin.southwagga.com.au ─────────────────
server {
  listen 80;
  server_name admin.southwagga.com.au;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name admin.southwagga.com.au;

  ssl_certificate     /etc/nginx/certs/admin.southwagga.com.au.crt;
  ssl_certificate_key /etc/nginx/certs/admin.southwagga.com.au.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  limit_req zone=admin burst=10 nodelay;

  # Restrict to known IPs (optional but recommended)
  # allow 203.0.113.0/24;  # EmuTel office
  # deny all;

  location / {
    proxy_pass         http://directus:8055;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Large uploads for photo galleries
    client_max_body_size 50M;
  }
}
